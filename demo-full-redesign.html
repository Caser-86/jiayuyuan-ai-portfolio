<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整改造 Demo · 贾玉元.AI</title>
    <script src="https://unpkg.com/lucide@1.17.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        section { padding: 100px 0; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.25rem; margin-bottom: 12px; }
        .section-header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* Hero */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.2) 0%, transparent 40%),
                        radial-gradient(circle at 30% 70%, rgba(79,70,229,0.15) 0%, transparent 40%);
            position: relative;
        }
        .hero-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
        }
        @media (max-width: 768px) { .hero-content { grid-template-columns: 1fr; text-align: center; } }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99,102,241,0.12);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 999px;
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .hero-text h1 { font-size: 3rem; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
        .typing { color: var(--primary); border-right: 3px solid var(--primary); padding-right: 6px; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
        .hero-text > p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 24px; max-width: 540px; }
        .hero-stats { display: flex; gap: 40px; margin-bottom: 32px; }
        @media (max-width: 768px) { .hero-stats { justify-content: center; } }
        .stat { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }
        .hero-buttons { display: flex; gap: 16px; }
        @media (max-width: 768px) { .hero-buttons { justify-content: center; } }
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
        .avatar-wrapper { position: relative; width: 280px; height: 280px; margin: 0 auto; }
        .avatar-glow {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(99,102,241,0.4) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
        }
        .avatar-img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
        }

        /* Skills */
        .skills-toolbar { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .view-toggle {
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .view-toggle.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .skill-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(20px);
        }
        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .skill-name { font-size: 1.1rem; font-weight: 700; }
        .skill-level { color: var(--primary); font-weight: 700; }
        .skill-progress { height: 8px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .skill-progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary-dark), var(--primary)); border-radius: 999px; width: 0; transition: width 1s ease; }
        .skill-desc { color: var(--text-muted); font-size: 0.9rem; margin-top: 12px; }
        .radar-wrapper { display: grid; grid-template-columns: 300px 1fr; gap: 48px; align-items: center; justify-items: center; }
        @media (max-width: 768px) { .radar-wrapper { grid-template-columns: 1fr; } }
        .radar-legend { display: flex; flex-direction: column; gap: 14px; }
        .legend-item { display: flex; align-items: center; gap: 12px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-level { color: var(--text-muted); margin-left: auto; }

        /* Portfolio */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 28px;
        }
        .portfolio-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .portfolio-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(0,0,0,0.35); }
        .portfolio-img-wrapper { position: relative; height: 220px; overflow: hidden; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); }
        .portfolio-img { width: 100%; height: 100%; object-fit: cover; }
        .portfolio-overlay {
            position: absolute; inset: 0;
            background: rgba(15,23,42,0.6);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .portfolio-card:hover .portfolio-overlay { opacity: 1; }
        .portfolio-info { padding: 24px; }
        .portfolio-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .project-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(99,102,241,0.15);
            color: #a5b4fc;
        }
        .impact-tag {
            background: rgba(34,197,94,0.15);
            color: #86efac;
        }
        .portfolio-info h3 { font-size: 1.25rem; margin-bottom: 8px; }
        .portfolio-info > p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 16px; }
        .portfolio-metrics { display: flex; gap: 16px; border-top: 1px solid var(--glass-border); padding-top: 16px; margin-bottom: 16px; }
        .metric { font-size: 0.8rem; color: var(--text-muted); }
        .metric strong { color: var(--text); display: block; font-size: 0.95rem; }
        .portfolio-actions { display: flex; gap: 12px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none; color: var(--text);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-body { padding: 40px; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
        .modal-title { font-size: 1.75rem; font-weight: 800; }
        .modal-subtitle { color: var(--text-muted); }
        .modal-img { width: 100%; height: 300px; object-fit: cover; border-radius: 16px; margin-bottom: 28px; }
        .case-section { margin-bottom: 28px; }
        .case-section h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .case-section p { color: var(--text-muted); margin-bottom: 12px; }
        .case-list { list-style: none; }
        .case-list li { padding: 6px 0 6px 24px; position: relative; color: var(--text-muted); }
        .case-list li::before { content: "✓"; position: absolute; left: 0; color: var(--success); font-weight: bold; }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-top: 16px; }
        .result-card { background: rgba(99,102,241,0.1); border-radius: 12px; padding: 20px; text-align: center; }
        .result-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .result-label { font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

<!-- Hero -->
<section class="hero-section">
    <div class="container">
        <div class="hero-content">
            <div class="hero-text">
                <div class="hero-badge">
                    <i data-lucide="sparkles" style="width:16px;height:16px;"></i>
                    资深 AI Agent & 自动化工程师
                </div>
                <h1>
                    专注于智能解决方案开发，<br>
                    <span class="typing" id="typing"></span>
                </h1>
                <p>通过大语言模型(LLM)、多智能体协作(Multi-Agent)和企业级工作流集成，将复杂的业务流程化繁为简。</p>
                <div class="hero-stats">
                    <div class="stat"><div class="stat-number">3+</div><div class="stat-label">年产品经验</div></div>
                    <div class="stat"><div class="stat-number">12</div><div class="stat-label">完整项目</div></div>
                    <div class="stat"><div class="stat-number">6</div><div class="stat-label">开源工具</div></div>
                </div>
                <div class="hero-buttons">
                    <a href="#portfolio" class="btn btn-primary">查看作品集 <i data-lucide="arrow-right" style="width:18px;height:18px;"></i></a>
                    <a href="#" class="btn btn-secondary">📄 下载简历</a>
                </div>
            </div>
            <div class="hero-avatar">
                <div class="avatar-wrapper">
                    <div class="avatar-glow"></div>
                    <img src="assets/avatar.png" alt="贾玉元" class="avatar-img">
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Skills -->
<section id="skills">
    <div class="container">
        <div class="section-header">
            <h2>专业技能</h2>
            <p>沉淀自多个垂直领域的项目实战，提供从模型适配、业务编排到最终交付的一站式 AI 解决方案。</p>
        </div>
        <div class="skills-toolbar">
            <button class="view-toggle active" onclick="switchSkillView('cards')">卡片视图</button>
            <button class="view-toggle" onclick="switchSkillView('radar')">雷达图</button>
        </div>
        <div id="skills-container">
            <div class="skills-grid" id="skills-grid"></div>
            <div class="radar-wrapper" id="radar-view" style="display:none;">
                <svg id="radar" viewBox="0 0 300 300" width="300" height="300"></svg>
                <div class="radar-legend" id="radar-legend"></div>
            </div>
        </div>
    </div>
</section>

<!-- Portfolio -->
<section id="portfolio">
    <div class="container">
        <div class="section-header">
            <h2>精选作品</h2>
            <p>从 AI Agent、RAG 知识库到数据可视化与游戏开发，覆盖多个垂直场景。</p>
        </div>
        <div class="portfolio-grid" id="portfolio-grid"></div>
    </div>
</section>

<!-- Modal -->
<div class="modal-overlay" id="project-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<script>
    // 打字机
    const texts = ["AI 产品经理", "独立开发者", "Agent 工程化实践者"];
    let ti = 0, ci = 0, deleting = false;
    const typingEl = document.getElementById('typing');
    function type() {
        const cur = texts[ti];
        if (deleting) { typingEl.textContent = cur.substring(0, ci - 1); ci--; }
        else { typingEl.textContent = cur.substring(0, ci + 1); ci++; }
        if (!deleting && ci === cur.length) { deleting = true; setTimeout(type, 1800); }
        else if (deleting && ci === 0) { deleting = false; ti = (ti + 1) % texts.length; setTimeout(type, 400); }
        else { setTimeout(type, deleting ? 50 : 110); }
    }
    type();

    // 技能数据
    const skills = [
        { name: "Python 后端与 FastAPI", level: 95, desc: "精通 Python 核心开发，熟悉 FastAPI/Flask 异步 Web 框架。" },
        { name: "大模型 Agent 与 Multi-Agent 编排", level: 93, desc: "深入理解 LangChain、LlamaIndex 与 AutoGen，擅长 Prompt 调优。" },
        { name: "RAG 与语义知识库", level: 90, desc: "熟悉向量检索、语义嵌入与命名实体识别系统构建。" },
        { name: "全栈 Web 前端开发", level: 88, desc: "原生 HTML/CSS/JS + React/Vue，能独立完成前后端产品。" },
        { name: "AI 工作流自动化与集成", level: 90, desc: "熟练使用 n8n、Flowise 等图形化流编排工具。" },
        { name: "数据可视化与智能分析", level: 87, desc: "掌握 Pandas/NumPy，熟悉 D3.js、ECharts 可视化图表。" }
    ];

    // 渲染技能卡片
    function renderSkillsCards() {
        const grid = document.getElementById('skills-grid');
        grid.innerHTML = skills.map(s => `
            <div class="skill-card">
                <div class="skill-header">
                    <div class="skill-name">${s.name}</div>
                    <div class="skill-level">${s.level}%</div>
                </div>
                <div class="skill-progress">
                    <div class="skill-progress-bar" data-width="${s.level}"></div>
                </div>
                <div class="skill-desc">${s.desc}</div>
            </div>
        `).join('');
        setTimeout(() => {
            document.querySelectorAll('.skill-progress-bar').forEach(bar => {
                bar.style.width = bar.dataset.width + '%';
            });
        }, 100);
    }

    // 渲染雷达图
    function renderRadar() {
        const svg = document.getElementById('radar');
        svg.innerHTML = '';
        const center = 150, radius = 100;
        const angle = i => (Math.PI * 2 * i) / skills.length - Math.PI / 2;
        const colors = ['#6366f1','#818cf8','#a5b4fc','#c7d2fe','#ddd6fe','#f5d0fe'];

        // 网格
        for (let r = 0.2; r <= 1; r += 0.2) {
            const points = skills.map((_, i) => {
                const a = angle(i);
                return `${center + radius * r * Math.cos(a)},${center + radius * r * Math.sin(a)}`;
            }).join(' ');
            const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
            poly.setAttribute('points', points);
            poly.setAttribute('fill','none');
            poly.setAttribute('stroke','rgba(255,255,255,0.1)');
            svg.appendChild(poly);
        }
        // 轴线
        skills.forEach((_, i) => {
            const a = angle(i);
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1', center); line.setAttribute('y1', center);
            line.setAttribute('x2', center + radius * Math.cos(a));
            line.setAttribute('y2', center + radius * Math.sin(a));
            line.setAttribute('stroke','rgba(255,255,255,0.1)');
            svg.appendChild(line);
        });
        // 数据
        const dataPoints = skills.map((s, i) => {
            const a = angle(i);
            return `${center + radius * (s.level/100) * Math.cos(a)},${center + radius * (s.level/100) * Math.sin(a)}`;
        }).join(' ');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points', dataPoints);
        poly.setAttribute('fill','rgba(99,102,241,0.25)');
        poly.setAttribute('stroke','#6366f1');
        poly.setAttribute('stroke-width','2');
        svg.appendChild(poly);
        // 点 + 标签
        skills.forEach((s, i) => {
            const a = angle(i);
            const x = center + radius * (s.level/100) * Math.cos(a);
            const y = center + radius * (s.level/100) * Math.sin(a);
            const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', 4);
            c.setAttribute('fill','#6366f1');
            svg.appendChild(c);
            const tx = center + (radius + 24) * Math.cos(a);
            const ty = center + (radius + 24) * Math.sin(a);
            const text = document.createElementNS('http://www.w3.org/2000/svg','text');
            text.setAttribute('x', tx); text.setAttribute('y', ty);
            text.setAttribute('fill','#94a3b8'); text.setAttribute('font-size','11');
            text.setAttribute('text-anchor','middle'); text.setAttribute('dominant-baseline','middle');
            text.textContent = s.name.split(' ')[0];
            svg.appendChild(text);
        });
        // 图例
        document.getElementById('radar-legend').innerHTML = skills.map((s, i) => `
            <div class="legend-item">
                <div class="legend-dot" style="background:${colors[i]}"></div>
                <div>${s.name}</div>
                <div class="legend-level">${s.level}%</div>
            </div>
        `).join('');
    }

    function switchSkillView(view) {
        document.querySelectorAll('.view-toggle').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('skills-grid').style.display = view === 'cards' ? 'grid' : 'none';
        document.getElementById('radar-view').style.display = view === 'radar' ? 'grid' : 'none';
        if (view === 'radar') renderRadar();
    }

    renderSkillsCards();

    // 项目数据（模拟后端）
    const projects = [
        {
            id: 0,
            title: "InsightGraph · 多智能体深度研究引擎",
            tags: ["LangGraph", "Multi-Agent", "FastAPI"],
            impact: "研究效率提升 10x",
            metrics: [
                { label: "文档处理", value: "10万+" },
                { label: "上线周期", value: "3周" },
                { label: "角色", value: "独立负责" }
            ],
            context: "企业做竞品分析、技术趋势研究时，需要大量人工搜索、阅读、整理资料，效率低且容易遗漏关键信息。",
            techDetails: "采用 LangGraph StateGraph 编排 6 个智能体协同工作：Planner 负责任务分解与查询策略，Collector/Executor 执行多轮工具调用。",
            outcome: "实现从任务拆解、多源信息采集、证据评分到长篇报告生成的全流程自动化，支持 Markdown/HTML 报告导出。",
            demo_url: "https://libaweiyu.xyz/demo/insightgraph",
            github_url: "https://github.com/Caser-86/insightgraph",
            images: ["assets/project1.png"]
        },
        {
            id: 1,
            title: "StoryForge · AI 互动叙事引擎",
            tags: ["Next.js", "LLM", "PostgreSQL"],
            impact: "叙事连贯性提升 60%",
            metrics: [
                { label: "用户测试", value: "50+" },
                { label: "故事分支", value: "1000+" },
                { label: "角色", value: "全栈开发" }
            ],
            context: "互动叙事产品的核心难点在于如何让 AI 生成的剧情保持连贯性、分支合理性和完整的故事弧线。",
            techDetails: "基于 Next.js 全栈应用，使用 LLM 生成剧情节点，PostgreSQL 存储故事状态图，支持多结局回溯。",
            outcome: "构建了一套可配置的角色、世界观和剧情约束系统，显著降低 AI 跑题概率。",
            demo_url: "",
            github_url: "https://github.com/Caser-86/storyforge",
            images: ["assets/project4.png"]
        },
        {
            id: 2,
            title: "企业知识库智能检索系统",
            tags: ["RAG", "LlamaIndex", "VectorDB"],
            impact: "客服响应时间缩短 50%",
            metrics: [
                { label: "检索准确率", value: "92%" },
                { label: "POC→交付", value: "2个月" },
                { label: "角色", value: "全栈开发" }
            ],
            context: "企业内部文档分散在多个系统中，员工查找信息成本高，客服回答标准不一。",
            techDetails: "使用 RAG 技术构建语义检索平台，支持 PDF/Word/网页多格式解析，引用溯源。",
            outcome: "为企业内部构建统一知识入口，客服响应时间显著缩短。",
            demo_url: "",
            github_url: "",
            images: ["assets/project8.png"]
        }
    ];

    function renderProjects() {
        const grid = document.getElementById('portfolio-grid');
        grid.innerHTML = projects.map((p, index) => {
            const tagsHTML = p.tags.map(t => `<span class="project-tag">${t}</span>`).join('');
            const impactHTML = p.impact ? `<span class="project-tag impact-tag">${p.impact}</span>` : '';
            const metricsHTML = p.metrics && p.metrics.length
                ? `<div class="portfolio-metrics">${p.metrics.map(m => `<div class="metric"><strong>${m.value}</strong>${m.label}</div>`).join('')}</div>`
                : '';
            const demoBtn = p.demo_url
                ? `<a href="${p.demo_url}" target="_blank" class="btn btn-primary btn-sm">在线体验 <i data-lucide="external-link" style="width:14px;height:14px;"></i></a>`
                : '';
            const imgSrc = p.images && p.images[0] ? p.images[0] : '';
            return `
                <div class="portfolio-card">
                    <div class="portfolio-img-wrapper">
                        <img src="${imgSrc}" alt="${p.title}" class="portfolio-img">
                        <div class="portfolio-overlay">
                            <button class="btn btn-primary" onclick="openModal(${index})">查看详情</button>
                        </div>
                    </div>
                    <div class="portfolio-info">
                        <div class="portfolio-tags">${tagsHTML}${impactHTML}</div>
                        <h3>${p.title}</h3>
                        <p>${p.context}</p>
                        ${metricsHTML}
                        <div class="portfolio-actions">
                            <button class="btn btn-secondary btn-sm" onclick="openModal(${index})">阅读案例</button>
                            ${demoBtn}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        lucide.createIcons();
    }

    function openModal(index) {
        const p = projects[index];
        const demoBtn = p.demo_url ? `<a href="${p.demo_url}" target="_blank" class="btn btn-primary">在线体验 <i data-lucide="external-link" style="width:16px;height:16px;"></i></a>` : '';
        const githubBtn = p.github_url ? `<a href="${p.github_url}" target="_blank" class="btn btn-secondary">GitHub</a>` : '';
        const resultsHTML = p.metrics ? p.metrics.map(m => `
            <div class="result-card"><div class="result-value">${m.value}</div><div class="result-label">${m.label}</div></div>
        `).join('') : '';

        document.getElementById('modal-body').innerHTML = `
            <div class="modal-header">
                <div>
                    <div class="modal-title">${p.title}</div>
                    <div class="modal-subtitle">${p.tags.join(' · ')}</div>
                </div>
                <div style="display:flex;gap:12px;">${demoBtn}${githubBtn}</div>
            </div>
            <img src="${p.images[0]}" alt="${p.title}" class="modal-img">
            <div class="case-section">
                <h3><i data-lucide="target" style="width:18px;height:18px;"></i> 背景与挑战</h3>
                <p>${p.context}</p>
            </div>
            <div class="case-section">
                <h3><i data-lucide="code-2" style="width:18px;height:18px;"></i> 我的职责与技术方案</h3>
                <p>${p.techDetails}</p>
            </div>
            <div class="case-section">
                <h3><i data-lucide="trending-up" style="width:18px;height:18px;"></i> 关键成果</h3>
                <p>${p.outcome}</p>
                <div class="result-grid">${resultsHTML}</div>
            </div>
        `;
        document.getElementById('project-modal').classList.add('active');
        lucide.createIcons();
    }

    function closeModal(e) {
        if (!e || e.target.id === 'project-modal') {
            document.getElementById('project-modal').classList.remove('active');
        }
    }

    renderProjects();
</script>

</body>
</html>
